    <body>
        <div class="card" style="width: 100%">
            
            
            <div id="mynetwork" class="card-body"></div>
        </div>

        
        

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#ADD8E6", "id": "embedding_step", "label": "embedding_step", "shape": "box", "title": null}, {"color": "#90EE90", "id": "ValidationResultEvent", "label": "ValidationResultEvent", "shape": "ellipse", "title": null}, {"color": "#90EE90", "id": "EmbeddingsCreatedEvent", "label": "EmbeddingsCreatedEvent", "shape": "ellipse", "title": null}, {"color": "#90EE90", "id": "FallbackToLLMEvent", "label": "FallbackToLLMEvent", "shape": "ellipse", "title": null}, {"color": "#ADD8E6", "id": "end_step", "label": "end_step", "shape": "box", "title": null}, {"color": "#90EE90", "id": "AnswerGeneratedEvent", "label": "AnswerGeneratedEvent", "shape": "ellipse", "title": null}, {"color": "#FFA07A", "id": "StopEvent", "label": "StopEvent", "shape": "ellipse", "title": null}, {"color": "#ADD8E6", "id": "fallback_llm_step", "label": "fallback_llm_step", "shape": "box", "title": null}, {"color": "#ADD8E6", "id": "llm_step", "label": "llm_step", "shape": "box", "title": null}, {"color": "#90EE90", "id": "PromptBuiltEvent", "label": "PromptBuiltEvent", "shape": "ellipse", "title": null}, {"color": "#ADD8E6", "id": "prompt_step", "label": "prompt_step", "shape": "box", "title": null}, {"color": "#90EE90", "id": "RerankEvent", "label": "RerankEvent", "shape": "ellipse", "title": null}, {"color": "#ADD8E6", "id": "rerank_step", "label": "rerank_step", "shape": "box", "title": null}, {"color": "#90EE90", "id": "RetrievalEvent", "label": "RetrievalEvent", "shape": "ellipse", "title": null}, {"color": "#ADD8E6", "id": "retrieval_step", "label": "retrieval_step", "shape": "box", "title": null}, {"color": "#ADD8E6", "id": "start_step", "label": "start_step", "shape": "box", "title": null}, {"color": "#E27AFF", "id": "StartEvent", "label": "StartEvent", "shape": "ellipse", "title": null}, {"color": "#90EE90", "id": "QueryEvent", "label": "QueryEvent", "shape": "ellipse", "title": null}, {"color": "#ADD8E6", "id": "validate_step", "label": "validate_step", "shape": "box", "title": null}, {"color": "#90EE90", "id": "ValidationErrorEvent", "label": "ValidationErrorEvent", "shape": "ellipse", "title": null}, {"color": "#ADD8E6", "id": "validation_error_step", "label": "validation_error_step", "shape": "box", "title": null}]);
                  edges = new vis.DataSet([{"arrows": "to", "from": "embedding_step", "to": "EmbeddingsCreatedEvent"}, {"arrows": "to", "from": "embedding_step", "to": "FallbackToLLMEvent"}, {"arrows": "to", "from": "ValidationResultEvent", "to": "embedding_step"}, {"arrows": "to", "from": "end_step", "to": "StopEvent"}, {"arrows": "to", "from": "AnswerGeneratedEvent", "to": "end_step"}, {"arrows": "to", "from": "fallback_llm_step", "to": "AnswerGeneratedEvent"}, {"arrows": "to", "from": "FallbackToLLMEvent", "to": "fallback_llm_step"}, {"arrows": "to", "from": "llm_step", "to": "AnswerGeneratedEvent"}, {"arrows": "to", "from": "PromptBuiltEvent", "to": "llm_step"}, {"arrows": "to", "from": "prompt_step", "to": "PromptBuiltEvent"}, {"arrows": "to", "from": "prompt_step", "to": "FallbackToLLMEvent"}, {"arrows": "to", "from": "RerankEvent", "to": "prompt_step"}, {"arrows": "to", "from": "rerank_step", "to": "RerankEvent"}, {"arrows": "to", "from": "rerank_step", "to": "FallbackToLLMEvent"}, {"arrows": "to", "from": "RetrievalEvent", "to": "rerank_step"}, {"arrows": "to", "from": "retrieval_step", "to": "RetrievalEvent"}, {"arrows": "to", "from": "retrieval_step", "to": "FallbackToLLMEvent"}, {"arrows": "to", "from": "EmbeddingsCreatedEvent", "to": "retrieval_step"}, {"arrows": "to", "from": "start_step", "to": "QueryEvent"}, {"arrows": "to", "from": "StartEvent", "to": "start_step"}, {"arrows": "to", "from": "validate_step", "to": "ValidationResultEvent"}, {"arrows": "to", "from": "validate_step", "to": "ValidationErrorEvent"}, {"arrows": "to", "from": "QueryEvent", "to": "validate_step"}, {"arrows": "to", "from": "validation_error_step", "to": "StopEvent"}, {"arrows": "to", "from": "ValidationErrorEvent", "to": "validation_error_step"}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {
        "enabled": false
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": true,
            "type": "dynamic"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "enabled": true,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
